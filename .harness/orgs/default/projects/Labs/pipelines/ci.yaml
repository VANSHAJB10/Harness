pipeline:
  name: ci
  identifier: ci
  projectIdentifier: Labs
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: false
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8testcluster
              namespace: default
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Say Hi
                  identifier: Say_Hi
                  spec:
                    connectorRef: dockervanshajb10
                    image: hey-vanshaj
                    shell: Bash
                    command: echo "Hi"
    - stage:
        name: cd
        identifier: cd
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: TestServiceJuly2
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
            gitBranch: main
            failureStrategies:
              - onFailure:
                  errors:
                    - Unknown
                  action:
                    type: MarkAsFailure
          environment:
            environmentRef: K8Env
            deployToAll: false
            infrastructureDefinitions:
              - identifier: lab2infra
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
              - step:
                  type: Email
                  name: Email for rollback
                  identifier: Email_for_rollback
                  spec:
                    to: vanshaj.bajaj@harness.io
                    cc: ""
                    subject: Rollback of Deployment
                    body: |-
                      Hey Vanshaj,
                      the deployment has been rolled back
                    fireAndForget: false
                  timeout: 10m
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        sendGitStatus:
          enabled: false
          name: ""
